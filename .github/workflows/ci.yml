name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same branch/PR instead of letting them queue up.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  POETRY_VERSION: "2.1.3"

jobs:
  test:
    name: Lint, type-check & test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-in-project: true

      - name: Cache the virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}

      - name: Verify poetry.lock is up to date with pyproject.toml
        run: poetry check --lock

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Lint (black)
        run: poetry run black --check src tests

      - name: Lint (isort)
        run: poetry run isort --check-only src tests

      - name: Lint (flake8)
        run: poetry run flake8 src tests

      - name: Type-check (mypy)
        run: poetry run mypy src

      - name: Unit tests
        run: poetry run pytest tests/unit -m unit --cov-report=xml:coverage-unit.xml

      - name: Integration tests
        run: poetry run pytest tests/integration -m integration --cov-report=xml:coverage-integration.xml

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage-*.xml
          retention-days: 14
