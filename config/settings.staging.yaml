# Staging Configuration
# Used for testing before production deployment

environment: staging
debug: false
log_level: INFO

# Data Configuration
data:
  raw_data_path: "data/healthy_diet_calorie_intake.csv"
  processed_data_path: "data/processed_staging"
  sample_size: null  # Use all data in staging

# Model Configuration
model:
  test_size: 0.15
  random_state: 42
  models_output_dir: "models_staging"
  selection_metric: "mcc"
  xgboost_params:
    n_estimators: 300
    max_depth: 6
    learning_rate: 0.05
    eval_metric: "mlogloss"
  catboost_params:
    iterations: 300
    depth: 6
    learning_rate: 0.05
    verbose: false

# API Configuration
api:
  host: "0.0.0.0"
  port: 8000
  reload: false

# Storage Configuration
storage:
  cache_enabled: true
  cache_dir: ".cache/staging"
